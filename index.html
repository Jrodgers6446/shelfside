<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F1B24">
<meta name="description" content="Shelfside — your reading room: free classics, pasted books, comics, and read-aloud mode">
<title>Shelfside</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
<meta name="application-name" content="Shelfside">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Shelfside">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<script>
if("serviceWorker" in navigator) window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js",{scope:"./"}).catch(()=>{}));
if(window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone) document.documentElement.classList.add("pwa");
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1F1B24; --ink2:#2A2533; --paper:#F5F1E8; --card:#FFFFFF; --line:#E2DCCE;
  --slate:#6E6878; --green:#1F6B52; --green-dark:#15523E; --brass:#B98A2F;
  --radius:14px; --display:'Fraunces',serif; --ui:'Inter',system-ui,sans-serif; --read:'Source Serif 4',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--ui);background:var(--paper);color:var(--ink);min-height:100dvh;
  padding-bottom:calc(72px + env(safe-area-inset-bottom))}
html.pwa body{padding-top:env(safe-area-inset-top)}
@media (display-mode: standalone){body{padding-top:env(safe-area-inset-top)}}
.app{max-width:560px;margin:0 auto;padding:0 16px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px}
:focus-visible{outline:3px solid var(--green);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

header{display:flex;align-items:baseline;justify-content:space-between;padding:18px 0 8px}
.wordmark{font-family:var(--display);font-weight:700;font-size:24px;letter-spacing:-.01em}
.wordmark em{font-style:italic;color:var(--green)}
.tab-title{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--slate)}

/* ---------- shelf (signature: generated typographic covers) ---------- */
.shelf{display:grid;grid-template-columns:repeat(3,1fr);gap:14px 12px;margin-top:6px}
.book{display:flex;flex-direction:column;gap:7px;text-align:left}
.cover{aspect-ratio:2/3;border-radius:6px 10px 10px 6px;position:relative;overflow:hidden;
  box-shadow:0 3px 10px rgba(31,27,36,.22), inset 4px 0 0 rgba(0,0,0,.18);display:flex;flex-direction:column;justify-content:space-between;padding:12px 10px}
.cover .ct{font-family:var(--display);font-weight:600;color:#fff;font-size:14px;line-height:1.2;word-break:break-word;
  display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.cover .ca{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.75);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cover .badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.35);color:#fff;font-size:8.5px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:3px 6px;border-radius:4px}
.cover.comic-cover{padding:0}
.cover.comic-cover img{width:100%;height:100%;object-fit:cover}
.cover.comic-cover .ct,.cover.comic-cover .ca{position:relative;z-index:2}
.cover.comic-cover .shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65),transparent 55%)}
.cover.comic-cover .meta{position:absolute;left:10px;right:10px;bottom:10px;z-index:2}
.bmeta .bt{font-size:12.5px;font-weight:600;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bprog{height:3px;background:var(--line);border-radius:2px;margin-top:5px;overflow:hidden}
.bprog i{display:block;height:100%;background:var(--brass);border-radius:2px}
.bmeta .bp{font-size:10.5px;color:var(--slate);margin-top:3px}

/* ---------- cards / rows / fields (shared) ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
.card-head h2{font-family:var(--display);font-weight:600;font-size:16px}
.card-head .sub{font-size:12px;color:var(--slate)}
.rows .row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}
.rows .row:last-child{border-bottom:none}
.row .grow{flex:1;min-width:0}
.row .t1{font-weight:600;font-size:14.5px;line-height:1.3}
.row .t2{font-size:12.5px;color:var(--slate);margin-top:2px}
.iconbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--paper);font-size:15px;color:var(--slate);flex:none;display:flex;align-items:center;justify-content:center}
.empty{padding:30px 18px;text-align:center;color:var(--slate);font-size:13.5px;line-height:1.6}
.empty b{color:var(--ink)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;
  font-weight:700;font-size:15px;background:var(--ink);color:#fff}
.btn:active{transform:scale(.99)}
.btn.green{background:var(--green)} .btn.green:active{background:var(--green-dark)}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px}
.btnrow{display:flex;gap:10px;margin:14px 0}
.btnrow .btn{flex:1}
.field{margin-bottom:13px}
.field label{display:block;font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;background:var(--card)}
.field textarea{min-height:170px;line-height:1.55;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--ink)}
.hint{font-size:12.5px;color:var(--slate);line-height:1.55;margin:8px 0 14px}
.searchbox{position:relative;margin:10px 0 12px}
.searchbox input{width:100%;padding:13px 14px 13px 40px;border:1px solid var(--line);border-radius:12px;background:var(--card)}
.searchbox svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--slate);fill:none;stroke-width:2;stroke-linecap:round}
.status{padding:24px 0;text-align:center;color:var(--slate);font-size:13.5px;line-height:1.6}
.spin{display:inline-block;width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-4px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.chip{padding:8px 13px;border:1px solid var(--line);border-radius:999px;background:var(--card);font-size:13px;font-weight:600}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.lib-toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.lib-toolbar .btn{padding:10px 14px;font-size:13px;width:auto}
.tag-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag-pill{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--line);color:var(--slate);font-weight:600}
.tag-pill.folder-pill{background:#e8f4ef;color:var(--green)}
.org-list{max-height:min(52vh,420px);overflow-y:auto;margin:12px 0;-webkit-overflow-scrolling:touch}
.org-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.org-row input[type=checkbox]{width:20px;height:20px;flex:none;accent-color:var(--green)}
.org-row .grow{min-width:0;flex:1}
.org-row .t{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.org-row .s{font-size:11px;color:var(--slate);margin-top:2px}
.org-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.file-area{border:2px dashed var(--green);border-radius:12px;padding:18px 16px;margin:4px 0 14px;background:var(--card);text-align:center}
.file-area .file-label{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);margin-bottom:12px}
.file-area .btn{margin-bottom:8px}

/* ---------- bottom nav ---------- */
nav{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);z-index:40}
.nav-inner{max-width:560px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;color:var(--slate);font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button.active{color:var(--ink)}
nav button.active::after{content:"";width:18px;height:3px;background:var(--green);border-radius:2px;margin-top:1px}

/* ---------- sheet ---------- */
.sheet-backdrop{position:fixed;inset:0;background:rgba(31,27,36,.5);z-index:50;display:none}
.sheet-backdrop.open{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--paper);border-radius:18px 18px 0 0;
  max-width:560px;margin:0 auto;max-height:90dvh;display:flex;flex-direction:column;transform:translateY(105%);transition:transform .28s cubic-bezier(.32,.72,.2,1)}
.sheet.open{transform:translateY(0)}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px}
.sheet-head h3{font-family:var(--display);font-weight:600;font-size:18px}
.sheet-body{overflow-y:auto;padding:0 18px 26px;-webkit-overflow-scrolling:touch}
.close{width:34px;height:34px;border-radius:50%;background:var(--line);font-size:16px;font-weight:700;flex:none}

/* ---------- reader ---------- */
.reader{position:fixed;inset:0;z-index:70;background:var(--rd-bg,#F8F4EA);color:var(--rd-ink,#241F1A);display:none;flex-direction:column}
.reader.open{display:flex}
.reader.dark{--rd-bg:#17141C;--rd-ink:#D9D3C8;--rd-dim:#8B8496;--rd-line:#2B2533;--rd-hl:#2E2A1C}
.reader.light{--rd-bg:#F8F4EA;--rd-ink:#241F1A;--rd-dim:#8A8275;--rd-line:#E4DECF;--rd-hl:#F2E7C8}
.rhead{display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;border-bottom:1px solid var(--rd-line)}
.rhead .rtitle{flex:1;min-width:0;font-family:var(--display);font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rhead .iconbtn{background:transparent;border-color:var(--rd-line);color:var(--rd-dim)}
.rbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 22px 120px}
.rtext{max-width:620px;margin:0 auto;font-family:var(--read);font-size:var(--rd-size,18px);line-height:1.72}
.rtext p{margin-bottom:1.05em}
.rtext p.speaking{background:var(--rd-hl);border-radius:4px;box-shadow:0 0 0 6px var(--rd-hl)}
.rpages{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.rpages img{width:100%;border-radius:6px;background:#0003;display:block;min-height:120px}
.rfoot{position:absolute;left:0;right:0;bottom:0;background:var(--rd-bg);border-top:1px solid var(--rd-line);
  padding:10px 16px calc(12px + env(safe-area-inset-bottom))}
.rfoot-inner{max-width:620px;margin:0 auto}
.rprogress{display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--rd-dim);margin-bottom:8px}
.rprogress .bar{flex:1;height:3px;background:var(--rd-line);border-radius:2px;overflow:hidden}
.rprogress .bar i{display:block;height:100%;background:var(--brass)}
.tts{display:flex;align-items:center;justify-content:center;gap:14px}
.tts .tbtn{width:44px;height:44px;border-radius:50%;border:1px solid var(--rd-line);color:var(--rd-ink);display:flex;align-items:center;justify-content:center}
.tts .tbtn svg{width:19px;height:19px;fill:currentColor;stroke:none}
.tts .play{width:58px;height:58px;background:var(--green);border-color:var(--green);color:#fff}
.tts .play svg{width:24px;height:24px}
.ttsmeta{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--rd-dim);margin-top:8px}
.ttsmeta select{background:transparent;border:none;color:var(--rd-dim);font-size:11.5px;max-width:46vw;padding:2px}
.ratewrap{display:flex;align-items:center;gap:6px}
.ratewrap input[type=range]{width:90px;accent-color:var(--green)}
.toast{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:80;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.settings-note{font-size:12.5px;color:var(--slate);line-height:1.55;margin-top:6px}
.src-tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green);border:1px solid currentColor;border-radius:4px;padding:2px 5px;flex:none}
.install-banner{background:var(--ink);color:#fff;border-radius:12px;padding:12px 14px;margin:0 0 12px;display:flex;align-items:flex-start;gap:10px}
.install-banner .ib-grow{flex:1;min-width:0;font-size:13px;line-height:1.45}
.install-banner .ib-grow b{display:block;font-size:14px;margin-bottom:2px}
.install-banner button.ib-x{color:#fff;flex:none;font-size:22px;line-height:1;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:8px;-webkit-tap-highlight-color:transparent}
.friend-banner{border:2px solid var(--green)!important;background:linear-gradient(180deg,#eef9f4 0%,var(--card) 100%)}
.friend-banner .hint{color:var(--slate)}
.share-preview{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.share-thumb{width:52px;height:68px;border-radius:6px;object-fit:cover;background:var(--line);flex:none}
.share-thumb.text-thumb{display:flex;align-items:center;justify-content:center;font-size:8px;padding:3px;text-align:center;color:#fff;line-height:1.2;font-weight:600}
.share-code{font-family:monospace;font-size:10px;word-break:break-all;max-height:88px;overflow-y:auto;padding:10px;background:var(--paper);border:1px solid var(--line);border-radius:8px;margin:8px 0}
.install-banner button.ib-x:active{background:rgba(255,255,255,.15)}
.install-banner[hidden]{display:none!important}
.install-banner .btn.sm{margin-top:8px;background:var(--green);color:#fff;border:none}
</style>
</head>
<body>
<div class="app">
  <div class="install-banner" id="installBanner" hidden>
    <div class="ib-grow">
      <b>Install Shelfside on your home screen</b>
      <span id="installBannerText">Works offline like an app.</span>
      <button type="button" class="btn sm" id="installBannerBtn">Show me how</button>
    </div>
    <button type="button" class="ib-x" id="installBannerX" aria-label="Dismiss install banner">×</button>
  </div>
  <header>
    <div class="wordmark">Shelf<em>side</em></div>
    <div class="tab-title" id="tabTitle">Library</div>
  </header>
  <main id="view"></main>
</div>

<nav aria-label="Main">
  <div class="nav-inner">
    <button data-tab="library" class="active"><svg viewBox="0 0 24 24"><path d="M4 19.5V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14.5M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/></svg>Library</button>
    <button data-tab="discover"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>Discover</button>
    <button data-tab="create"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Create</button>
    <button data-tab="settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 0 0-2-1.2L14 3h-4l-.5 2.6a7 7 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2.4l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 2 1.2L10 21h4l.5-2.6a7 7 0 0 0 2-1.2l2.4 1 2-3.4-2-1.6c.07-.4.1-.8.1-1.2z"/></svg>Settings</button>
  </div>
</nav>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="sheet-head"><h3 id="sheetTitle"></h3><button type="button" class="close" id="sheetClose" aria-label="Close">✕</button></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<!-- fullscreen reader -->
<div class="reader light" id="reader">
  <div class="rhead">
    <button class="iconbtn" id="rBack" aria-label="Back to library">‹</button>
    <div class="rtitle" id="rTitle"></div>
    <button class="iconbtn" id="rFontDn" aria-label="Smaller text">A−</button>
    <button class="iconbtn" id="rFontUp" aria-label="Larger text">A+</button>
    <button class="iconbtn" id="rTheme" aria-label="Toggle theme">◐</button>
  </div>
  <div class="rbody" id="rBody"></div>
  <div class="rfoot" id="rFoot">
    <div class="rfoot-inner">
      <div class="rprogress"><span id="rPct">0%</span><div class="bar"><i id="rBar" style="width:0%"></i></div><span id="rPos"></span></div>
      <div class="tts" id="ttsRow">
        <button class="tbtn" id="tPrev" aria-label="Previous paragraph"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zM20 6l-10 6 10 6z"/></svg></button>
        <button class="tbtn play" id="tPlay" aria-label="Play read-aloud"><svg viewBox="0 0 24 24" id="tPlayIcon"><path d="M8 5l11 7-11 7z"/></svg></button>
        <button class="tbtn" id="tNext" aria-label="Next paragraph"><svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM4 6l10 6-10 6z"/></svg></button>
      </div>
      <div class="ttsmeta" id="ttsMeta">
        <select id="tVoice" aria-label="Voice"></select>
        <div class="ratewrap"><span>speed</span><input type="range" id="tRate" min="0.6" max="1.8" step="0.1" value="1"><b id="tRateVal">1.0×</b></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* =================== IndexedDB =================== */
const DB = { db: null };
function dbOpen(){
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VERSION);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains("books"))
        d.createObjectStore("books", { keyPath: "id" });
      if(!d.objectStoreNames.contains("content"))
        d.createObjectStore("content", { keyPath: "id" });
    };
    r.onblocked = () => toast("Close other Shelfside tabs, then reload");
    r.onsuccess = () => { DB.db = r.result; res(); };
    r.onerror = () => rej(r.error);
  });
}
const reqP = r => new Promise((res, rej) => { r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
const dbPut = (s, v) => reqP(DB.db.transaction(s, "readwrite").objectStore(s).put(v));
const dbGet = (s, k) => reqP(DB.db.transaction(s).objectStore(s).get(k));
const dbAll = s => reqP(DB.db.transaction(s).objectStore(s).getAll());
const dbDel = (s, k) => reqP(DB.db.transaction(s, "readwrite").objectStore(s).delete(k));
function noteLibraryOrigin(){
  try{ localStorage.setItem("shelfside.origin", location.origin); }catch(e){}
}
function markHasBooks(){
  try{
    localStorage.setItem("shelfside.hadBooks", "1");
    noteLibraryOrigin();
  }catch(e){}
}
async function ensurePersistentStorage(){
  try{
    if(navigator.storage?.persist && !(await navigator.storage.persisted()))
      await navigator.storage.persist();
  }catch(e){}
}
function bufToB64(buf){
  const bytes = new Uint8Array(buf);
  let s = "";
  for(let i = 0; i < bytes.length; i += 0x8000)
    s += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  return btoa(s);
}
function bufToB64url(buf){
  return bufToB64(buf).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
}
function b64urlToBuf(s){
  let t = String(s || "").replace(/-/g, "+").replace(/_/g, "/");
  while(t.length % 4) t += "=";
  return b64ToBuf(t);
}
function b64ToBuf(b64){
  const s = atob(b64);
  const bytes = new Uint8Array(s.length);
  for(let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
  return bytes;
}
function guessImageType(name, type){
  const t = String(type || "").toLowerCase();
  if(t.startsWith("image/")) return t;
  const ext = String(name || "").split(".").pop().toLowerCase();
  return ({ png: "image/png", gif: "image/gif", webp: "image/webp", bmp: "image/bmp", avif: "image/avif" })[ext] || "image/jpeg";
}
function comicBytesFromRaw(raw){
  if(!raw) return null;
  if(raw instanceof ArrayBuffer) return raw.byteLength ? raw.slice(0) : null;
  if(ArrayBuffer.isView(raw)) return raw.byteLength
    ? raw.buffer.slice(raw.byteOffset, raw.byteOffset + raw.byteLength) : null;
  if(typeof raw === "string"){ const b = b64ToBuf(raw); return b.byteLength ? b : null; }
  return null;
}
async function normalizeComicPage(page){

    const buf = comicBytesFromRaw(page.data);
    if(buf?.byteLength) return { name: page.name || "page.jpg", type: guessImageType(page.name, page.type), data: buf };
  }
  if(page instanceof Blob){
    const buf = (await page.arrayBuffer()).slice(0);
    if(!buf.byteLength) throw new Error("empty");
    return { name: page.name || "page.jpg", type: guessImageType(page.name, page.type), data: buf };
  }
  throw new Error("badpage");
}
async function normalizeComicPages(pages){

  }

}
function pageToBlob(page){
  if(page instanceof Blob) return page.size ? page : null;

}

async function buildShareData(ids = null){
  let all = await dbAll("books");
  if(ids?.length) all = all.filter(b => ids.includes(b.id));
  const items = [];
  for(const meta of all){
    const c = await dbGet("content", meta.id);
    const exportMeta = { ...meta, coverURL: undefined };
    exportMeta.tags = bookTagList(exportMeta);
    exportMeta.folder = bookFolder(exportMeta);
    if(meta.type === "comic"){
      const pages = [];
      for(const p of (c?.pages || [])){
        const buf = comicBytesFromRaw(p?.data);
        if(p instanceof Blob && !buf?.byteLength){
          const b = await p.arrayBuffer();
          if(b?.byteLength) pages.push({ name: p.name || "page.jpg", type: guessImageType(p.name, p.type), data: bufToB64(b) });
          continue;
        }
        if(!buf?.byteLength) continue;
        pages.push({
          name: p.name || "page.jpg",
          type: guessImageType(p.name, p.type),
          data: bufToB64(buf)
        });
      }
      items.push({ meta: exportMeta, pages });
    }else{
      items.push({ meta: exportMeta, text: c?.text || "" });
    }
  }
  if(!items.length) throw new Error("empty");
  const filename = ids?.length === 1
    ? "shelfside-" + safeFilename(all[0]?.title) + ".json"
    : "shelfside-library-" + new Date().toISOString().slice(0, 10) + ".json";
  const data = { shelfside: 2, exported: Date.now(), origin: location.origin, app: APP_VERSION, books: items };
  return { data, count: items.length, filename };
}

async function encodeShelfShare(data){
  let json;
  try{ json = JSON.stringify(data); }catch(e){ throw new Error("encode"); }
  try{
    if(typeof CompressionStream !== "undefined"){
      const buf = await new Response(new Blob([json]).stream().pipeThrough(new CompressionStream("gzip"))).arrayBuffer();
      return "S1." + bufToB64url(buf);
    }
  }catch(e){}
  return "S0." + bufToB64url(new TextEncoder().encode(json));
}
async function decodeShelfShare(code){
  code = String(code || "").trim();
  const m = code.match(/^(S[01])\.(.+)$/);
  if(!m) throw new Error("badcode");
  const bytes = b64urlToBuf(m[2]);
  let json;
  if(m[1] === "S1"){
    if(typeof DecompressionStream === "undefined") throw new Error("nogzip");
    json = await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"))).text();
  }else{
    json = new TextDecoder().decode(bytes);
  }
  const data = JSON.parse(json);
  if(!Array.isArray(data?.books) || !data.books.length) throw new Error("empty");
  return data;
}
function parseTextShareCode(raw){
  const s = String(raw || "").trim();
  if(!s) return "";
  const urlM = s.match(/[?#&]shelf=([^&\s#]+)/i);
  if(urlM){
    try{ return decodeURIComponent(urlM[1]); }catch(e){ return urlM[1]; }
  }
  const inline = s.match(/S[01]\.[A-Za-z0-9_-]+/);
  if(inline) return inline[0];
  if(/^S[01]\./.test(s)) return s.split(/\s/)[0];
  return "";
}

async function importLibraryBackup(file){
  const data = JSON.parse(await file.text());
  const items = data?.books;
  if(!Array.isArray(items) || !items.length) throw new Error("empty");
  let added = 0;
  for(const item of items){
    const meta = { ...item.meta, id: uid(), coverURL: undefined, tags: bookTagList(item.meta), folder: bookFolder(item.meta) };
    if(meta.folder) rememberFolder(meta.folder);
    if(meta.type === "comic"){
      const pages = [];
      for(const p of (item.pages || []).slice(0, MAX_COMIC_PAGES)){
        const bytes = comicBytesFromRaw(p?.data);
        if(!bytes?.byteLength) continue;
        pages.push({
          name: p.name || "page.jpg",
          type: guessImageType(p.name, p.type),
          data: bytes
        });
      }
      if(!pages.length) continue;
      meta.pageCount = pages.length;
      meta.progress = meta.progress || { ratio: 0, pos: 0 };
      await dbPut("content", { id: meta.id, pages });
    }else{
      const text = (item.text || "").trim();
      if(!text) continue;
      meta.length = text.length;
      meta.progress = meta.progress || { ratio: 0, pos: 0 };
      await dbPut("content", { id: meta.id, text });
    }
    await dbPut("books", meta);
    added++;
  }
  if(!added) throw new Error("empty");
  markHasBooks();
  await ensurePersistentStorage();
  return added;
}

function htmlToText(html){

function xmlLocalKids(parent, name){

function resolvePath(base, href){

  parts.pop();
  for(const seg of href.split("/")){

function parseOpfMeta(opfDoc){
  const meta = { title: "", author: "" };
  const md = xmlLocalKids(opfDoc.documentElement, "metadata")[0];
  if(!md) return meta;
  for(const el of md.getElementsByTagName("*")){
    const n = el.localName;
    if(n === "title" && !meta.title) meta.title = el.textContent.trim();
    if((n === "creator" || n === "author") && !meta.author) meta.author = el.textContent.trim();
  }
  return meta;
}
async function epubFromZip(zip){
  const containerXml = await zipReadText(zip, "META-INF/container.xml");
  if(!containerXml) throw new Error("epub");
  const containerDoc = new DOMParser().parseFromString(containerXml, "application/xml");
  const rootfile = [...containerDoc.getElementsByTagName("*")].find(el => el.localName === "rootfile");
  const opfPath = xmlAttr(rootfile, "full-path");
  if(!opfPath) throw new Error("epub");
  const opfXml = await zipReadText(zip, opfPath);
  if(!opfXml) throw new Error("epub");
  const opfDoc = new DOMParser().parseFromString(opfXml, "application/xml");
  const meta = parseOpfMeta(opfDoc);
  const opfDir = opfPath.includes("/") ? opfPath.slice(0, opfPath.lastIndexOf("/") + 1) : "";
  const manifest = {};
  const manifestEl = xmlLocalKids(opfDoc.documentElement, "manifest")[0];
  (manifestEl ? xmlLocalKids(manifestEl, "item") : []).forEach(item => {
    const id = xmlAttr(item, "id");
    if(id) manifest[id] = { href: xmlAttr(item, "href"), type: xmlAttr(item, "media-type") };
  });
  function isChapter(entry){
    if(!entry?.href) return false;
    const mt = entry.type || "";
    return /html|xhtml|xml/i.test(mt) || /\.x?html?$/i.test(entry.href);
  }
  async function readChapter(entry){
    const path = resolvePath(opfDir, entry.href);
    const html = await zipReadText(zip, path);
    return html ? htmlToText(html) : "";
  }
  const parts = [];
  const spine = xmlLocalKids(opfDoc.documentElement, "spine")[0];
  const refs = spine ? xmlLocalKids(spine, "itemref") : [];
  for(const itemref of refs){
    const entry = manifest[xmlAttr(itemref, "idref")];
    if(!entry || !isChapter(entry)) continue;
    const chunk = await readChapter(entry);
    if(chunk) parts.push(chunk);
  }
  if(!parts.length){
    for(const entry of Object.values(manifest)){
      if(!isChapter(entry)) continue;
      const chunk = await readChapter(entry);
      if(chunk) parts.push(chunk);
    }
  }
  return { text: parts.join("\n\n").trim(), title: meta.title, author: meta.author };
}

async function extractTextFromNonEpub(file){
  const name = file.name.toLowerCase();
  const type = file.type || "";
  if(type === "application/pdf" || name.endsWith(".pdf")){
    const pdfjs = await loadPdfJs();
    const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
    const parts = [];
    for(let p = 1; p <= pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      parts.push(tc.items.map(it => it.str).join(" "));
    }
    return parts.join("\n\n").trim();
  }
  if(type === "text/html" || name.endsWith(".html") || name.endsWith(".htm"))
    return htmlToText(await file.text());
  if(type.startsWith("text/") || /\.(txt|md|markdown|text|csv|log|json|xml|rtf)$/.test(name))
    return (await file.text()).trim();
  const guess = await file.text();
  if(guess && !guess.includes("\0")) return guess.trim();
  throw new Error("unsupported");
}
async function importFileContent(file){
  const name = file.name.toLowerCase();
  const type = file.type || "";
  if(type === "application/epub+zip" || name.endsWith(".epub")) return extractEpub(file);
  if(type === "application/pdf" || name.endsWith(".pdf")) return { text: await extractTextFromNonEpub(file) };
  if(type === "text/html" || name.endsWith(".html") || name.endsWith(".htm")) return { text: htmlToText(await file.text()) };
  if(type.startsWith("text/") || /\.(txt|md|markdown|text|csv|log|json|xml|rtf)$/.test(name))
    return { text: (await file.text()).trim() };
  const head = new Uint8Array(await file.slice(0, 4).arrayBuffer());
  if(head[0] === 0x25 && head[1] === 0x50) return { text: await extractTextFromNonEpub(file) }; // %PDF
  if(head[0] === 0x50 && head[1] === 0x4b) return extractEpub(file); // PK zip / epub
  try{
    const guess = await file.text();
    if(guess && !guess.includes("\0")) return { text: guess.trim() };
  }catch(e){}
  throw new Error("unsupported");
}

function isComicImagePath(path){
  return /\.(jpe?g|png|gif|webp|bmp|avif)$/i.test(path);
}
async function extractImagesFromZip(buf){
  const JSZip = await loadJSZip();
  const zip = await JSZip.loadAsync(buf);
  const entries = [];
  zip.forEach((path, entry) => {
    if(entry.dir || !isComicImagePath(path)) return;
    entries.push({ path, entry });
  });
  entries.sort((a, b) => naturalSort(a.path, b.path));
  const pages = [];
  for(const { path, entry } of entries){
    const blob = await entry.async("blob");
    const ext = path.split(".").pop().toLowerCase();
    const type = ext === "png" ? "image/png" : ext === "gif" ? "image/gif" : ext === "webp" ? "image/webp" : "image/jpeg";
    pages.push(new File([blob], path.split("/").pop(), { type }));
  }
  if(!pages.length) throw new Error("noimages");
  return pages;
}
async function extractImagesFromPdf(file){
  const pdfjs = await loadPdfJs();
  const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
  const pages = [];
  for(let i = 1; i <= pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 1.4 });
    const canvas = document.createElement("canvas");
    canvas.width = viewport.width; canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
    const blob = await new Promise(res => canvas.toBlob(res, "image/jpeg", 0.88));
    if(!blob) throw new Error("render");
    pages.push(new File([blob], `page-${String(i).padStart(3, "0")}.jpg`, { type: "image/jpeg" }));
  }
  return pages;
}
async function extractComicPagesFromFile(file){
  const name = file.name.toLowerCase();
  if(file.type.startsWith("image/") || isComicImagePath(name) || /\.heic$/i.test(name) || /\.heif$/i.test(name)){
    const type = guessImageType(name, file.type === "image/heic" || /\.heic$/i.test(name) ? "image/jpeg" : file.type);
    const buf = (await file.arrayBuffer()).slice(0);
    if(!buf.byteLength) throw new Error("noimages");
    return [{ name: file.name || "page.jpg", type, data: buf }];
  }
  if(name.endsWith(".cbz") || name.endsWith(".zip")) return extractImagesFromZip(await file.arrayBuffer());
  if(name.endsWith(".pdf") || file.type === "application/pdf") return extractImagesFromPdf(file);
  throw new Error("unsupported");
}
async function extractComicPagesFromInput(fileList, existing = 0){
  const pages = [];

  if(room <= 0) throw new Error("maxpages");
  for(const file of fileList){
    const batch = await extractComicPagesFromFile(file);
    pages.push(...batch);
    if(pages.length >= room) break;
  }
  return pages.slice(0, room);
}

  const slice = incoming.slice(0, room);
  return { pages: existing.concat(slice), added: slice.length, capped: incoming.length > slice.length };
}

const COMIC_IMG_SKIP_RE = /avatar|icon|logo|emoji|spacer|pixel\.gif|1x1|badge|button|sprite|banner|advert|ads?[-_/]|tracking|favicon|profile[-_]?pic/i;
function comicImageUrlOk(url, el){

  if(isDirectImageUrl(url)) return true;
  if(/\/(?:comics?|pages?|media|uploads?|images?|wp-content|manga|chapter)\//i.test(url)) return true;
  const w = +(el?.getAttribute?.("width") || el?.getAttribute?.("data-width") || 0);
  const h = +(el?.getAttribute?.("height") || el?.getAttribute?.("data-height") || 0);
  if(w > 0 && w < 100 && h > 0 && h < 100) return false;
  return !!(el && (el.closest?.("article,main,[class*='comic'],[class*='reader'],[class*='chapter'],[id*='comic']") || el.className?.match?.(/page|comic|chapter/i)));

function extractComicImageUrls(html, pageUrl){
  const doc = new DOMParser().parseFromString(html, "text/html");
  stripWaybackChrome(doc);
  const found = [];
  const seen = new Set();
  function add(raw, el){
    const u = resolvePageUrl(raw, pageUrl);
    if(!u || seen.has(u) || !comicImageUrlOk(u, el)) return;
    seen.add(u);
    found.push({ url: u, el });
  }
  doc.querySelectorAll("img[src], img[data-src], img[data-lazy-src], img[data-original]").forEach(img => {
    add(img.getAttribute("data-src") || img.getAttribute("data-lazy-src") || img.getAttribute("data-original") || img.getAttribute("src"), img);
    const srcset = img.getAttribute("srcset");
    if(srcset){
      const best = srcset.split(",").map(s => s.trim().split(/\s+/)[0]).filter(Boolean).pop();
      if(best) add(best, img);
    }
  });
  doc.querySelectorAll("a[href]").forEach(a => {
    const h = a.getAttribute("href") || "";
    if(isDirectImageUrl(h)) add(h, a);
  });
  doc.querySelectorAll("picture source[srcset], source[src]").forEach(s => {
    const srcset = s.getAttribute("srcset") || s.getAttribute("src") || "";
    const pick = srcset.split(",").map(x => x.trim().split(/\s+/)[0]).filter(Boolean).pop();
    if(pick) add(pick, s.parentElement);
  });
  if(!found.length){
    const og = doc.querySelector('meta[property="og:image"], meta[name="twitter:image"]')?.getAttribute("content");
    if(og) add(og, null);
  }
  return found.map(f => f.url);
}
async function fetchImageBytes(url){
  const enc = encodeURIComponent(url);
  const attempts = [
    `/api/fetch-url?url=${enc}&bin=1`,
    `/api/fetch-url?url=${enc}`
  ];
  for(const proxy of attempts){
    try{
      const r = await fetch(proxy, { headers: { ...FETCH_HEADERS, Accept: "image/*,application/json,*/*" } });
      if(!r.ok) continue;
      const ct = (r.headers.get("content-type") || "").toLowerCase();
      if(ct.includes("application/json")){
        const j = await r.json();
        if(j?.base64){
          const bytes = b64ToBuf(j.base64);
          if(bytes.byteLength > 80) return { bytes, type: j.type || guessImageType(url) };
        }
        continue;
      }
      if(ct.startsWith("image/") || ct.includes("octet-stream")){
        const bytes = await r.arrayBuffer();
        if(bytes.byteLength > 80) return { bytes, type: ct.split(";")[0] || guessImageType(url) };
      }
    }catch(e){}
  }
  throw new Error("fetch");
}
async function imageUrlToComicPage(url, index = 0){
  const { bytes, type } = await fetchImageBytes(url);
  const name = (url.split("/").pop() || "").split("?")[0] || `page-${String(index + 1).padStart(3, "0")}.jpg`;
  return { name, type: guessImageType(name, type), data: bytes.slice(0) };
}
async function importComicPagesFromUrl(urlInput, existing = 0){
  const pageUrl = normalizeUrl(urlInput);
  const room = MAX_COMIC_PAGES - existing;
  if(room <= 0) throw new Error("maxpages");
  const urls = [];
  if(isDirectImageUrl(pageUrl)) urls.push(pageUrl);
  else{
    const html = await fetchPageHtml(pageUrl);
    urls.push(...extractComicImageUrls(html, pageUrl));
  }
  if(!urls.length) throw new Error("noimages");
  const pages = [];
  for(let i = 0; i < urls.length && pages.length < room; i++){
    try{
      pages.push(await imageUrlToComicPage(urls[i], pages.length));
    }catch(e){}
  }
  if(!pages.length) throw new Error("fetch");
  return pages;
}
function wireComicUrlImport(root, { inputSel, btnSel, infoSel, onPages, existing = 0 }){

  const btn = root.querySelector(btnSel);
  const info = infoSel ? root.querySelector(infoSel) : null;
  btn.onclick = async () => {
    const raw = input.value.trim();
    if(!raw){ toast("Paste a link first"); return; }
    const prev = btn.textContent;
    btn.textContent = "Fetching…"; btn.disabled = true;
    if(info) info.innerHTML = `<span class="spin"></span> Loading images from link…`;
    try{
      const pages = await importComicPagesFromUrl(raw, existing);
      await onPages(pages, raw);
      if(info) info.innerHTML = `Loaded <b>${pages.length}</b> image${pages.length === 1 ? "" : "s"} from link.`;
      toast(`${pages.length} page${pages.length === 1 ? "" : "s"} loaded`);
    }catch(err){
      const msg = err?.message === "fetch" ? "Couldn't download images from that link"
        : err?.message === "noimages" ? "No comic images found on that page — try a direct image URL or gallery page"
        : err?.message === "maxpages" ? `Comic limit is ${MAX_COMIC_PAGES} pages` : "Link import failed";
      if(info) info.textContent = msg;
      toast(msg);
    }finally{
      btn.textContent = prev; btn.disabled = false;
    }
  };
}
function wireComicImport(root, { inputSel, pickSel, infoSel, onReady, state }){
  const store = state || { pages: [] };
  function getPending(){ return store.pages; }
  function setPending(pages){
    store.pages = pages;
    onReady(pages);
  }
  const fi = root.querySelector(inputSel);
  const pick = root.querySelector(pickSel);
  const info = infoSel ? root.querySelector(infoSel) : null;
  function showCount(extra){
    if(!info) return;
    const n = getPending().length;
    const left = MAX_COMIC_PAGES - n;
    const cap = left <= 0 ? ` <b>Limit reached</b> (${MAX_COMIC_PAGES} pages max).` : left < MAX_COMIC_PAGES ? ` · room for <b>${left}</b> more` : "";
    info.innerHTML = `<b>${n}</b> / ${MAX_COMIC_PAGES} page${n === 1 ? "" : "s"} ready${cap}${extra || ""}`;
  }
  showCount();
  pick.onclick = () => {
    if(getPending().length >= MAX_COMIC_PAGES){ toast(`Comic limit is ${MAX_COMIC_PAGES} pages`); return; }
    fi.click();
  };
  fi.onchange = async () => {
    if(!fi.files?.length) return;
    const prev = pick.textContent;
    pick.textContent = "Reading…"; pick.disabled = true;
    if(info) info.innerHTML = `<span class="spin"></span> Extracting comic pages…`;
    try{
      const batch = await extractComicPagesFromInput(fi.files, getPending().length);
      const merged = await mergeComicPagesAsync(getPending(), batch);
      setPending(merged.pages);
      showCount(merged.capped ? ` — only ${merged.added} added (limit ${MAX_COMIC_PAGES})` : ` — ${[...fi.files].map(f => esc(f.name)).join(", ")}`);
      toast(merged.capped ? `Added ${merged.added} pages (limit ${MAX_COMIC_PAGES})` : `${merged.pages.length} pages ready`);
    }catch(err){
      if(err?.message === "maxpages"){
        if(info) info.innerHTML = `Already at the <b>${MAX_COMIC_PAGES}</b>-page limit.`;
        toast(`Comic limit is ${MAX_COMIC_PAGES} pages`);
      }else{
        if(info) info.textContent = "Couldn't read that file. Try images, CBZ (.cbz), or PDF.";
        toast("Comic import failed");
      }
    }finally{
      pick.textContent = prev; pick.disabled = false;
      fi.value = "";
    }
  };
  return () => store.pages;
}
function normalizeUrl(input){
  let s = input.trim();
  if(!s) throw new Error("empty");
  if(!/^https?:\/\//i.test(s)) s = "https://" + s;
  return new URL(s).href;
}
const FETCH_HEADERS = {
  Accept: "text/html,text/plain,*/*",
  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
};
async function readFetchText(r){
  const ct = (r.headers.get("content-type") || "").toLowerCase();
  if(ct.includes("application/json")){
    const j = await r.json();
    if(typeof j.contents === "string") return j.contents;
    if(typeof j.data === "string") return j.data;
  }
  return await r.text();
}
async function fetchPageHtml(url){
  const enc = encodeURIComponent(url);
  const attempts = [
    `/api/fetch-url?url=${enc}`,
    `https://api.allorigins.win/raw?url=${enc}`,
    `https://api.allorigins.win/get?url=${enc}`,
    `https://api.cors.lol/?url=${enc}`,
    `https://cors.eu.org/${url}`
  ];
  for(const proxy of attempts){
    try{
      const r = await fetch(proxy, { headers: FETCH_HEADERS });
      if(!r.ok) continue;
      const text = await readFetchText(r);
      if(text && text.length > 40) return text;
    }catch(e){}
  }
  try{
    const r = await fetch(url, { headers: FETCH_HEADERS });
    if(r.ok){
      const text = await r.text();
      if(text && text.length > 40) return text;
    }
  }catch(e){}
  throw new Error("fetch");
}
async function fetchJson(url){
  const enc = encodeURIComponent(url);
  const attempts = [
    `/api/fetch-url?url=${enc}`,
    url
  ];
  for(const proxy of attempts){
    try{
      const r = await fetch(proxy, { headers: { ...FETCH_HEADERS, Accept: "application/json,*/*" } });
      if(!r.ok) continue;
      return JSON.parse(await r.text());
    }catch(e){}
  }
  return null;
}
function isWaybackHost(hostname){
  return /^(web\.)?archive\.org$/i.test(hostname || "");
}
function isWaybackUrl(url){
  try{
    const u = new URL(url);
    return isWaybackHost(u.hostname) && /^\/web\//i.test(u.pathname);
  }catch(e){ return false; }
}
function parseWaybackUrl(url){
  try{
    const u = new URL(url);
    if(!isWaybackHost(u.hostname)) return null;
    const m = u.pathname.match(/^\/web\/(\d{1,14}|\*+)([a-z_]{0,4})?\/(.+)$/i);
    if(!m) return null;
    let original = m[3];
    if(!/^https?:\/\//i.test(original)) original = "https://" + original;
    return {
      timestamp: /^\d+$/.test(m[1]) ? m[1] : "",
      modifier: m[2] || "",
      originalUrl: new URL(original).href,
      wildcard: m[1].includes("*")
    };
  }catch(e){ return null; }
}
function buildWaybackUrl(timestamp, originalUrl, modifier = ""){
  const orig = /^https?:\/\//i.test(originalUrl) ? originalUrl : `https://${originalUrl}`;
  return `https://web.archive.org/web/${timestamp}${modifier}/${orig}`;
}
function waybackFetchUrl(timestamp, originalUrl, modifier = ""){
  return buildWaybackUrl(timestamp, originalUrl, modifier);
}
async function waybackAvailableSnapshot(originalUrl){
  const j = await fetchJson(`https://archive.org/wayback/available?url=${encodeURIComponent(originalUrl)}`);
  const snap = j?.archived_snapshots?.closest;
  if(!snap?.available) return null;
  if(snap.status && String(snap.status) !== "200") return null;
  const fetchUrl = (snap.url || "").replace(/^http:/i, "https:");
  const parsed = parseWaybackUrl(fetchUrl);
  return {
    fetchUrl: parsed ? buildWaybackUrl(parsed.timestamp, parsed.originalUrl, parsed.modifier || "") : fetchUrl,
    timestamp: snap.timestamp || parsed?.timestamp || "",
    originalUrl: parsed?.originalUrl || originalUrl
  };
}
async function resolveWaybackInput(urlInput){
  const url = normalizeUrl(urlInput);
  if(!isWaybackUrl(url)) return { fetchUrl: url, originalUrl: url, timestamp: null, viaWayback: false };
  const parsed = parseWaybackUrl(url);
  if(!parsed?.originalUrl) throw new Error("fetch");
  if(parsed.timestamp && !parsed.wildcard){
    return {
      fetchUrl: buildWaybackUrl(parsed.timestamp, parsed.originalUrl, parsed.modifier || ""),
      originalUrl: parsed.originalUrl,
      timestamp: parsed.timestamp,
      viaWayback: true
    };
  }
  const snap = await waybackAvailableSnapshot(parsed.originalUrl);
  if(!snap) throw new Error("nowayback");
  return { ...snap, viaWayback: true };
}
function stripWaybackChrome(doc){

function stripGutenberg(text){
  const start = text.search(/\*\*\*\s*START OF (THE|THIS) PROJECT GUTENBERG.*?\*\*\*/i);
  if(start >= 0) text = text.slice(text.indexOf("***", start + 3) + 3);
  const end = text.search(/\*\*\*\s*END OF (THE|THIS) PROJECT GUTENBERG/i);
  if(end >= 0) text = text.slice(0, end);
  return text.trim();
}
async function gutenbergFromUrl(url){

  if(!m) return null;
  const r = await fetch(`https://gutendex.com/books/?ids=${m[1]}`);
  if(!r.ok) return null;
  const book = (await r.json()).results?.[0];
  const textUrl = book && txtURL(book.formats);
  if(!textUrl) return null;
  const tr = await fetch(textUrl);
  if(!tr.ok) return null;
  return { text: stripGutenberg(await tr.text()), title: book.title, author: (book.authors[0]||{}).name || "" };
}
function nodeHint(el){
  return `${el.className || ""} ${el.id || ""} ${el.getAttribute("role") || ""} ${el.getAttribute("itemprop") || ""}`.toLowerCase();
}
function normalizeFictionHtml(doc){
  doc.querySelectorAll("br").forEach(br => {
    const n = br.nextSibling;
    if(n && n.nodeName === "BR") br.replaceWith(document.createTextNode("\n\n"));
    else br.replaceWith(document.createTextNode("\n"));
  });
}
function pruneBoilerplate(doc){
  doc.querySelectorAll("script,style,noscript,nav,footer,aside,form,iframe,svg,button,input,select,textarea,label,.b-story-top,.b-story-sidebar,.b-story-footer,.b-pager,.b-story-stats,.b-breadcrumbs").forEach(n => n.remove());
  [...doc.querySelectorAll("*")].forEach(el => {
    const hint = nodeHint(el);
    if(BOILERPLATE_RE.test(hint)) el.remove();
    if(el.matches?.("header") && !STORY_HINT_RE.test(hint)) el.remove();
  });
}
function blockText(el){
  return (el.innerText || el.textContent || "").replace(/\n{3,}/g, "\n\n").trim();
}
function scoreStoryBlock(el){
  const text = blockText(el);
  const len = text.length;
  if(len < 120) return 0;
  const links = el.querySelectorAll("a").length;
  const ps = el.querySelectorAll("p").length;
  const brs = el.querySelectorAll("br").length;
  const paras = ps + Math.floor(brs / 2);
  const linkDensity = links / Math.max(1, len / 100);
  let score = len + paras * 70;
  score -= linkDensity * 700;
  const hint = nodeHint(el);
  if(STORY_HINT_RE.test(hint)) score += 1200;
  if(BOILERPLATE_RE.test(hint)) score -= 3000;
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const avgLine = lines.reduce((a, l) => a + l.length, 0) / Math.max(1, lines.length);
  if(avgLine < 28 && lines.length > 22) score -= 1500;
  if(avgLine > 55) score += 300;
  if(paras >= 2) score += 250;
  if(el.querySelectorAll("img").length > Math.max(2, paras)) score -= 900;
  if(el.closest?.(".b-story-header,.b-breadcrumbs,.b-pager")) score -= 5000;
  return score;
}
function cleanStoryText(text){
  return text.split("\n").filter(line => {
    const t = line.trim();
    if(!t) return true;
    if(FICTION_JUNK_RE.test(t)) return false;
    if(t.length < 4 && /^[\W\d]+$/.test(t)) return false;
    if(/^(©|copyright|\(c\))/i.test(t)) return false;
    if(/^\d+(\.\d+)?\s*stars?$/i.test(t)) return false;
    return true;
  }).join("\n").replace(/\n{3,}/g, "\n\n").trim();
}
function metaFromDoc(doc){

    || doc.querySelector(".b-story-header h1, h1")?.textContent?.trim()
    || doc.querySelector("title")?.textContent?.trim()?.split(/[|\-–]/)[0]?.trim() || "";
  const author = doc.querySelector('meta[name="author"]')?.content?.trim()
    || doc.querySelector(".b-story-header a, .b-story-user a, [rel='author'], .author")?.textContent?.trim() || "";
  return { title, author };
}
function metaFromLiteroticaHtml(html){
  const doc = new DOMParser().parseFromString(html, "text/html");
  stripWaybackChrome(doc);
  const meta = metaFromDoc(doc);
  for(const script of doc.querySelectorAll('script[type="application/ld+json"]')){
    try{
      const j = JSON.parse(script.textContent);
      if(j["@type"] === "Article" || j.headline){
        if(j.headline) meta.title = j.headline;
        if(j.author?.name) meta.author = j.author.name;
      }
    }catch(e){}
  }
  if(!meta.title){
    const m = html.match(/title:"([^"]+)",type:"story"/);
    if(m) meta.title = m[1];
  }
  return meta;
}
function literoticaSlugFromUrl(url){
  const m = new URL(url).pathname.match(/\/s\/([^/]+)/i);
  return m ? m[1] : "";
}
function literoticaBaseUrl(url){
  const u = new URL(url.split("#")[0]);
  u.search = "";
  return u.href;
}
function literoticaPageUrl(base, page){
  if(page <= 1) return base;
  const u = new URL(base);
  u.searchParams.set("page", String(page));
  return u.href;
}
function extractLiteroticaPageText(html){
  const key = html.indexOf("pageText:");
  if(key < 0) return "";
  let i = key + 9;
  while(i < html.length && /\s/.test(html[i])) i++;
  if(html[i] !== '"') return "";
  i++;
  let raw = "";
  while(i < html.length){
    const c = html[i];
    if(c === "\\"){
      const n = html[i + 1];
      if(n === "n"){ raw += "\n"; i += 2; continue; }
      if(n === "r"){ raw += "\r"; i += 2; continue; }
      if(n === "t"){ raw += "\t"; i += 2; continue; }
      if(n === '"'){ raw += '"'; i += 2; continue; }
      if(n === "\\"){ raw += "\\"; i += 2; continue; }
      raw += n || ""; i += 2; continue;
    }
    if(c === '"') break;
    raw += c;
    i++;
  }
  return raw.replace(/\r\n?/g, "\n").trim();
}
function stripLiteroticaJunk(text, meta){
  if(!text) return "";
  text = text.replace(LIT_JUNK_INLINE_RE, "");
  text = text.replace(/^[\s\S]*?\d+\s*Followers\s*/i, "");
  if(meta?.title){
    const t = meta.title.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    text = text.replace(new RegExp("^[\\s\\S]*?" + t + "\\s*", "i"), "");
  }
  if(meta?.author){
    const a = meta.author.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    text = text.replace(new RegExp("^\\s*" + a + "\\s*", "i"), "");
  }
  text = text.replace(/^\s*\d+\s*Stories\s*\d+\s*Followers\s*/i, "");
  text = text.replace(/\s*Report\s*[\s\S]*$/i, "");
  text = text.replace(/\s+\d+\s*Stories\s+\d+\s*Followers[\s\S]*$/i, "");
  return text.trim();
}
function extractLiteroticaFromDom(doc){
  doc.querySelectorAll("[class*='_container_37gas'], [class*='_card_'], script, style, noscript").forEach(n => n.remove());
  const root = doc.querySelector('[itemprop="articleBody"], [class*="_article__content_"]');
  if(!root) return "";
  root.querySelectorAll("[class*='_report_block'], [class*='_report__'], [class*='_author_'], .b-pager").forEach(n => n.remove());
  normalizeFictionHtml(root);
  const intro = root.querySelector("[class*='_introduction']") || root;
  const paras = [...intro.querySelectorAll("p")].map(p => (p.textContent || "").trim()).filter(t => t.length > 12 && !FICTION_JUNK_RE.test(t));
  if(paras.length && paras.join("\n\n").length > 120) return paras.join("\n\n");
  return blockText(intro);
}
function literoticaChunkFromHtml(html, meta){
  let chunk = extractLiteroticaPageText(html);
  if(chunk.length < 100){
    const doc = new DOMParser().parseFromString(html, "text/html");
    stripWaybackChrome(doc);
    chunk = extractLiteroticaFromDom(doc);
  }
  return cleanStoryText(stripLiteroticaJunk(chunk, meta));
}
function literoticaPageNumsFromHtml(html, slug){
  const nums = [1];
  if(!slug) return nums;
  const re = new RegExp("/s/" + slug.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\?page=(\\d+)", "gi");
  for(const m of html.matchAll(re)) nums.push(+m[1]);
  return nums;
}
function extractKnownStoryRoot(doc, pageUrl){
  if(pageUrl && /literotica\.com\/s\//i.test(pageUrl)){
    const lit = extractLiteroticaFromDom(doc);
    if(lit.length > 180) return { el: null, text: cleanStoryText(lit) };
  }
  if(pageUrl && /wattpad\.com/i.test(pageUrl)){
    const wp = wattpadChunkFromHtml(doc.documentElement.outerHTML);
    if(wp?.text?.length > 180) return { el: null, text: wp.text };
  }
  const selectors = [
    '[itemprop="articleBody"]',
    "[class*='_article__content_']",
    "[class*='b-story-body']",
    ".aa_ht",
    "#panel_Story",
    ".story-body",
    ".chapter-body",
    ".storytext",
    ".fiction-text",
    "article .text",
    "[itemprop='articleBody']",
    "main [role='main']"
  ];
  for(const sel of selectors){
    const el = doc.querySelector(sel);
    if(!el) continue;
    const text = cleanStoryText(blockText(el));
    if(text.length > 180) return { el, text };
  }
  return null;
}
function extractStoryFromHtml(html, pageUrl){
  const doc = new DOMParser().parseFromString(html, "text/html");
  stripWaybackChrome(doc);
  normalizeFictionHtml(doc);
  const meta = metaFromDoc(doc);
  const known = extractKnownStoryRoot(doc, pageUrl);
  if(known) return { text: known.text, title: meta.title, author: meta.author };
  pruneBoilerplate(doc);
  const candidates = new Set();
  ["article","main","[role=main]",".chapter",".story",".post-content",".entry-content",".article-body",".article-content","#content",".content",".reader",".fiction",".text","#chapter",".chapter-content",".story-content","[class*='story-body']"].forEach(sel => {
    doc.querySelectorAll(sel).forEach(el => candidates.add(el));
  });
  doc.querySelectorAll("p, div").forEach(p => {
    if(blockText(p).length < 60) return;
    let parent = p;
    for(let i = 0; i < 5 && parent && parent !== doc.body; i++){
      candidates.add(parent);
      parent = parent.parentElement;
    }
  });
  let best = null, bestScore = 0;
  for(const el of candidates){
    const s = scoreStoryBlock(el);
    if(s > bestScore){ bestScore = s; best = el; }
  }
  let text = cleanStoryText(blockText(best || doc.body));
  if(bestScore < 280 || text.length < 200) throw new Error("notstory");
  return { text, title: meta.title, author: meta.author };
}
function findNextPageUrl(doc, currentUrl){
  const next = [...doc.querySelectorAll("a[href]")].find(a => {
    const t = a.textContent.trim();
    return /^next$/i.test(t) || /^next page$/i.test(t) || a.classList.contains("b-pager-next");
  });
  if(next){
    try{ return new URL(next.getAttribute("href"), currentUrl).href; }catch(e){}
  }
  try{
    const u = new URL(currentUrl);
    const slug = literoticaSlugFromUrl(currentUrl);
    if(!slug) return null;
    const cur = +(u.searchParams.get("page") || 1);
    const nums = literoticaPageNumsFromHtml(doc.documentElement.outerHTML, slug);
    const nextNum = nums.filter(n => n > cur).sort((a, b) => a - b)[0];
    if(nextNum) return literoticaPageUrl(literoticaBaseUrl(currentUrl), nextNum);
  }catch(e){}
  return null;
}
function isWattpadHost(host){

function wattpadPartIdFromUrl(url){

function wattpadNormalizePartUrl(url){

function wattpadChapterPageUrl(baseUrl, page){

function extractPrefetchedFromHtml(html){
  const startIndex = html.indexOf("window.prefetched");
  if(startIndex < 0) return null;
  const openBraceIndex = html.indexOf("{", startIndex);
  if(openBraceIndex < 0) return null;
  let depth = 1;
  let i = openBraceIndex + 1;
  while(i < html.length && depth > 0){
    if(html[i] === "{") depth++;
    else if(html[i] === "}") depth--;
    i++;
  }
  try{ return JSON.parse(html.slice(openBraceIndex, i)); }catch(e){ return null; }
}
function wattpadDataFromPrefetched(prefetched){
  if(!prefetched) return null;

}
function wattpadPlainStoryText(raw){

    return (d.body.textContent || "").replace(/\r\n?/g, "\n");

function cleanWattpadText(text){

function wattpadChunkFromHtml(html){

  const doc = new DOMParser().parseFromString(html, "text/html");
  stripWaybackChrome(doc);
  const root = doc.querySelector("pre, [data-test-id='story-text'], .story-part, .panel-reading .pe-text, article pre");
  if(root){
    const text = cleanWattpadText(blockText(root));
    if(text.length > 80) return { text, data: null };
  }
  return null;
}
function wattpadFirstPartUrlFromHtml(html){
  const doc = new DOMParser().parseFromString(html, "text/html");
  stripWaybackChrome(doc);
  for(const a of doc.querySelectorAll("a.read-btn, a[data-e2e='read-story'], a[href]")){
    const href = a.getAttribute("href") || "";
    if(/\/\d{5,}/.test(href) && !href.includes("/story/") && !href.includes("/user/")){
      return href.startsWith("http") ? href : `https://www.wattpad.com${href}`;
    }
  }
  const data = wattpadDataFromPrefetched(extractPrefetchedFromHtml(html));
  const part = data?.group?.parts?.[0];
  return wattpadPartAbsoluteUrl(part?.url, part?.id);
}
async function wattpadReadChapterPages(chapterUrl, wayback){
  const pageFetch = url => wayback?.timestamp ? waybackFetchUrl(wayback.timestamp, url) : url;
  const base = wattpadNormalizePartUrl(chapterUrl);
  if(!base) return null;
  const chunks = [];
  let data = null;
  let totalPages = 1;
  for(let page = 1; page <= totalPages && page <= 40; page++){
    const url = wattpadChapterPageUrl(base, page);
    const html = await fetchPageHtml(pageFetch(url));
    const chunk = wattpadChunkFromHtml(html);
    if(!chunk?.text){
      if(page === 1) return null;
      break;
    }
    data = data || chunk.data;
    if(chunk.data?.pages) totalPages = Math.max(totalPages, chunk.data.pages);
    chunks.push(chunk.text);
    if(page >= totalPages) break;
  }
  const text = chunks.join("\n\n").trim();
  if(text.length < 30) return null;
  return { text, data };
}
async function wattpadFromUrl(startUrl, wayback = null){
  const pageFetch = url => wayback?.timestamp ? waybackFetchUrl(wayback.timestamp, url) : url;
  let chapterUrl = normalizeWattpadUrl(startUrl);
  if(wattpadStoryIdFromUrl(chapterUrl)){
    const storyHtml = await fetchPageHtml(pageFetch(chapterUrl));
    const resolved = wattpadFirstPartUrlFromHtml(storyHtml);
    if(!resolved) return null;
    chapterUrl = resolved;
  }else if(!wattpadPartIdFromUrl(chapterUrl)){
    return null;
  }
  const first = await wattpadReadChapterPages(chapterUrl, wayback);
  if(!first) return null;
  const group = first.data?.group;
  const storyTitle = group?.title || first.data?.title || "";
  const author = group?.user?.name || group?.user?.username || "";
  const startId = wattpadPartIdFromUrl(chapterUrl);
  const sections = [];
  const firstTitle = first.data?.title;
  if(firstTitle && firstTitle !== storyTitle) sections.push(`# ${firstTitle}\n\n${first.text}`);
  else sections.push(first.text);
  const partsList = group?.parts || [];
  let reachedStart = false;
  for(const part of partsList){
    const id = String(part.id);
    if(id === startId){ reachedStart = true; continue; }
    if(!reachedStart) continue;
    const partUrl = wattpadPartAbsoluteUrl(part.url, part.id);
    if(!partUrl) continue;
    try{
      const ch = await wattpadReadChapterPages(partUrl, wayback);
      if(!ch?.text || ch.text.length < 30) continue;
      const heading = part.title ? `# ${part.title}` : `# Part ${sections.length + 1}`;
      sections.push(`${heading}\n\n${ch.text}`);
    }catch(e){ break; }
    if(sections.length >= 120) break;
  }
  const text = sections.join("\n\n").trim();
  if(text.length < 80) return null;
  return { text, title: storyTitle, author };
}
async function literoticaFromUrl(startUrl, wayback = null){
  const base = literoticaBaseUrl(startUrl);
  const slug = literoticaSlugFromUrl(base);
  const pageFetch = url => wayback?.timestamp ? waybackFetchUrl(wayback.timestamp, url) : url;
  const parts = [];
  const firstHtml = await fetchPageHtml(pageFetch(base));
  const meta = metaFromLiteroticaHtml(firstHtml);
  const firstText = literoticaChunkFromHtml(firstHtml, meta);
  if(firstText.length < 100) return null;
  parts.push(firstText);
  let maxPage = Math.max(...literoticaPageNumsFromHtml(firstHtml, slug));
  for(let p = 2; p <= maxPage && p <= 40; p++){
    const html = await fetchPageHtml(pageFetch(literoticaPageUrl(base, p)));
    maxPage = Math.max(maxPage, ...literoticaPageNumsFromHtml(html, slug));
    const chunk = literoticaChunkFromHtml(html, meta);
    if(!chunk) break;
    parts.push(chunk);
  }
  const text = parts.join("\n\n").trim();
  if(text.length < 100) return null;
  return { text, title: meta.title, author: meta.author };
}
async function importFromUrl(urlInput){
  let ctx;
  try{
    ctx = await resolveWaybackInput(urlInput);
  }catch(e){
    if(e?.message === "nowayback") throw e;
    throw new Error("fetch");
  }
  let { fetchUrl, originalUrl, timestamp, viaWayback } = ctx;
  const wayback = timestamp ? { timestamp } : null;
  const host = new URL(originalUrl).hostname.replace(/^www\./, "");
  if(host.includes("literotica.com") && /\/s\//i.test(originalUrl)){
    try{
      const lit = await literoticaFromUrl(originalUrl, wayback);
      if(lit?.text) return lit;
    }catch(e){
      if(e?.message === "fetch" || e?.message === "nowayback") throw e;
    }
  }
  if(isWattpadHost(host)){
    try{
      const wp = await wattpadFromUrl(originalUrl, wayback);
      if(wp?.text) return wp;
    }catch(e){
      if(e?.message === "fetch" || e?.message === "nowayback") throw e;
    }
  }
  const gut = await gutenbergFromUrl(originalUrl);
  if(gut?.text) return gut;
  let html;
  try{
    html = await fetchPageHtml(fetchUrl);
  }catch(e){
    if(!viaWayback){
      const snap = await waybackAvailableSnapshot(originalUrl);
      if(snap){
        fetchUrl = snap.fetchUrl;
        viaWayback = true;
        html = await fetchPageHtml(fetchUrl);
      }else throw e;
    }else throw e;
  }
  if(!html.includes("<") && html.length > 80)
    return { text: stripGutenberg(html.trim()), title: "", author: "" };
  return extractStoryFromHtml(html, originalUrl);
}
function wireUrlImport(root, { inputSel, btnSel, infoSel, onImported }){
  const input = root.querySelector(inputSel);
  const btn = root.querySelector(btnSel);
  const info = infoSel ? root.querySelector(infoSel) : null;
  btn.onclick = async () => {
    const raw = input.value.trim();
    if(!raw){ toast("Paste a web link first"); return; }
    const prev = btn.textContent;
    btn.textContent = "Fetching…"; btn.disabled = true;
    if(info) info.innerHTML = `<span class="spin"></span> Loading story from link…`;
    try{
      const data = await importFromUrl(raw);
      if(!data.text){ toast("No story text found on that page"); return; }
      onImported(data, raw);
      toast("Story loaded");
    }catch(err){
      if(info) info.textContent = err?.message === "fetch"
        ? "Couldn't reach that link — check the URL and try again. Link import works on your Cloudflare Pages deploy."
        : err?.message === "nowayback"
        ? "No archived copy found on the Wayback Machine for that URL."
        : err?.message === "notstory"
        ? "Couldn't find a story on that page — try a Wattpad/Literotica chapter URL, Gutenberg, or Wayback."
        : "Couldn't read that link. Try Wattpad, Literotica, Gutenberg, Wayback, or a page with plain story text.";
      toast(err?.message === "fetch" ? "Link fetch failed" : err?.message === "nowayback" ? "No Wayback snapshot" : err?.message === "notstory" ? "No story found on page" : "Link import failed");
    }finally{
      btn.textContent = prev; btn.disabled = false;
    }
  };
}
function wireFileImport(root, { inputSel, pickSel, infoSel, onImported }){
  const fi = root.querySelector(inputSel);
  const pick = root.querySelector(pickSel);
  const info = infoSel ? root.querySelector(infoSel) : null;
  pick.onclick = () => fi.click();
  fi.onchange = async () => {
    const file = fi.files?.[0];
    if(!file) return;
    const prev = pick.textContent;
    pick.textContent = "Reading file…"; pick.disabled = true;
    if(info) info.innerHTML = `<span class="spin"></span> Extracting text from <b>${esc(file.name)}</b>…`;
    try{
      const data = await importFileContent(file);
      if(!data.text){ toast("No readable text in that file"); return; }
      onImported(data, file);
      toast("File imported");
    }catch(err){
      if(info) info.textContent = "Couldn't read that file. Try .epub, .pdf, .html, .txt, or .md.";
      toast("Import failed");
    }finally{
      pick.textContent = prev; pick.disabled = false;
      fi.value = "";
    }
  };
}

/* =================== DISCOVER (Project Gutenberg via Gutendex) =================== */
function renderDiscover(){
  view.innerHTML = `
    <div class="hint" style="margin-top:4px">Search <b>Project Gutenberg</b> — 75,000+ classic books, free and legal to keep. Saved books are stored on this device and readable offline.</div>
    <div class="searchbox">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="dq" type="search" placeholder="Title or author… e.g. Dracula, Austen" autocomplete="off">
    </div>
    <div id="dres"><div class="status">Try “Sherlock Holmes”, “Frankenstein”, “Moby Dick”, “Pride and Prejudice”…</div></div>`;
  const input = $("#dq"), res = $("#dres");
  let timer, seq = 0;
  input.focus();
  input.addEventListener("input", () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if(q.length < 3){ res.innerHTML = `<div class="status">Type at least 3 characters.</div>`; return; }
    timer = setTimeout(async () => {
      const my = ++seq;
      res.innerHTML = `<div class="status"><span class="spin"></span>Searching the catalog…</div>`;
      try{
        const r = await fetch(`https://gutendex.com/books?search=${encodeURIComponent(q)}`);
        if(!r.ok) throw new Error(r.status);
        const data = await r.json();
        if(my !== seq) return;
        const items = (data.results || []).filter(b => txtURL(b.formats)).slice(0, 20);
        if(!items.length){ res.innerHTML = `<div class="status">No readable matches. Gutenberg only carries public-domain books — for anything newer, use <b>Create</b> and paste the text.</div>`; return; }
        res.innerHTML = `<div class="card"><div class="rows">${items.map((b,i) => `
          <div class="row">
            <div class="grow"><div class="t1">${esc(b.title)}</div>
            <div class="t2">${esc((b.authors[0]||{}).name || "Unknown")} · ${(b.download_count||0).toLocaleString()} downloads</div></div>
            <span class="src-tag">Free</span>
            <button class="iconbtn" data-save="${i}" aria-label="Save ${esc(b.title)}" style="color:var(--green);font-weight:800">＋</button>
          </div>`).join("")}</div></div>`;
        res.querySelectorAll("[data-save]").forEach(btn => btn.onclick = () => saveGutenberg(items[+btn.dataset.save], btn));
      }catch(err){
        if(my !== seq) return;
        res.innerHTML = `<div class="status">Couldn't reach the catalog — check your connection and try again.</div>`;
      }
    }, 450);
  });
}
function txtURL(formats){
  for(const [k,v] of Object.entries(formats || {}))
    if(k.startsWith("text/plain") && !v.endsWith(".zip")) return v;
  return null;
}
async function saveGutenberg(item, btn){
  btn.textContent = "…"; btn.disabled = true;
  try{
    const r = await fetch(txtURL(item.formats));
    if(!r.ok) throw new Error(r.status);
    let text = await r.text();
    // strip Gutenberg boilerplate header/footer
    const start = text.search(/\*\*\*\s*START OF (THE|THIS) PROJECT GUTENBERG.*?\*\*\*/i);
    if(start >= 0) text = text.slice(text.indexOf("***", start + 3) + 3);
    const end = text.search(/\*\*\*\s*END OF (THE|THIS) PROJECT GUTENBERG/i);
    if(end >= 0) text = text.slice(0, end);
    text = text.trim();
    const id = uid();
    await dbPut("content", { id, text });
    await dbPut("books", { id, type: "text", title: item.title, author: (item.authors[0]||{}).name || "",
      source: "gutenberg", length: text.length, created: Date.now(), progress: { ratio: 0, pos: 0 } });
    markHasBooks();
    await ensurePersistentStorage();
    btn.textContent = "✓"; btn.style.color = "var(--green)";
    toast(`Saved “${item.title.length > 28 ? item.title.slice(0,28)+"…" : item.title}”`);
  }catch(err){
    btn.textContent = "＋"; btn.disabled = false;
    toast("Download failed — try another result");
  }
}

    updateInstallBanner();
  };
  $("#sSize").onchange = e => { prefs.fontSize = +e.target.value; savePrefs(); };
  $("#sTheme").onchange = e => { prefs.theme = e.target.value; savePrefs(); };
  $("#persist").onclick = async () => {
    if(!navigator.storage?.persist){ toast("Not supported on this browser"); return; }
    const ok = await navigator.storage.persist();
    toast(ok ? "Library protected" : "Browser declined — try after installing the app");
    renderSettings();
  };
  $("#shareTextLib").onclick = async () => {
    try{ await shareLibraryAsText(); }catch(e){ toast(e?.message === "empty" ? "Nothing to share yet" : "Share failed"); }
  };
  $("#receiveLib").onclick = receiveFromFriend;
  $("#exportLib").onclick = async () => {
    const n = (await dbAll("books")).length;
    if(!n){ toast("Nothing to export yet"); return; }
    try{
      await exportLibraryBackup();
      toast(`Exported ${n} book${n > 1 ? "s" : ""}`);
    }catch(e){ toast("Export failed"); }
  };
  const importFi = $("#importLibFile");
  $("#importLib").onclick = () => importFi.click();
  importFi.onchange = async () => {
    const file = importFi.files?.[0];
    importFi.value = "";
    if(!file) return;
    try{
      const n = await importLibraryBackup(file);
      toast(`Restored ${n} book${n > 1 ? "s" : ""}`);
      switchTab("library");
    }catch(e){ toast("Couldn't read that backup file"); }
  };
}

/* =================== READER =================== */
const reader = $("#reader"), rBody = $("#rBody");
let scrollSaveTimer = null;

async function openReader(id){
  const b = (await dbGet("books", id));
  const c = await dbGet("content", id);
  if(!b || !c){ toast("Couldn't open that book"); return; }
  currentBook = b;
  b.lastOpened = Date.now(); await dbPut("books", b);
  $("#rTitle").textContent = b.title;
  reader.className = "reader open " + prefs.theme;
  document.documentElement.style.setProperty("--rd-size", prefs.fontSize + "px");
  rBody.scrollTop = 0; rBody.innerHTML = "";
  ttsStop();
  pageURLs.forEach(u => URL.revokeObjectURL(u)); pageURLs = [];

  if(b.type === "text"){
    $("#ttsRow").style.display = ""; $("#ttsMeta").style.display = "";
    paragraphs = c.text.split(/\n\s*\n+/).map(p => p.replace(/\s+/g," ").trim()).filter(Boolean);
    renderedUpto = 0;
    rBody.innerHTML = `<div class="rtext" id="rText"></div><div id="rSentinel" style="height:1px"></div>`;
    const target = Math.floor((b.progress?.pos || 0));
    appendChunks(Math.max(CHUNK, target + 20));
    sentinelWatch();
    requestAnimationFrame(() => {
      const el = $("#rText").children[target];
      if(el) el.scrollIntoView();
      updateProgressUI();
    });
    ttsPrepare();
  } else {
    $("#ttsRow").style.display = "none"; $("#ttsMeta").style.display = "none";
    paragraphs = [];
    const wrap = document.createElement("div"); wrap.className = "rpages";
    c.pages.forEach((page, i) => {
      const blob = pageToBlob(page);
      const img = document.createElement("img");
      img.alt = `Page ${i+1}`;
      img.loading = i < 4 ? "eager" : "lazy";
      if(blob){
        const url = URL.createObjectURL(blob);
        pageURLs.push(url);
        img.src = url;
      }else{
        img.alt = `Page ${i+1} (couldn't load)`;
        img.style.minHeight = "120px";
      }
      wrap.appendChild(img);
    });
    rBody.appendChild(wrap);
    requestAnimationFrame(() => {
      const target = Math.floor(b.progress?.pos || 0);
      if(wrap.children[target]) wrap.children[target].scrollIntoView();
      updateProgressUI();
    });
  }
  rBody.onscroll = () => {
    updateProgressUI();
    clearTimeout(scrollSaveTimer);
    scrollSaveTimer = setTimeout(saveProgress, 600);
  };
}
function appendChunks(upto){
  const host = $("#rText"); if(!host) return;
  const frag = document.createDocumentFragment();
  const end = Math.min(paragraphs.length, upto);
  for(let i = renderedUpto; i < end; i++){
    const p = document.createElement("p");
    p.textContent = paragraphs[i]; p.dataset.i = i;
    frag.appendChild(p);
  }
  renderedUpto = end;
  host.appendChild(frag);
}
function sentinelWatch(){
  const s = $("#rSentinel"); if(!s) return;
  new IntersectionObserver(entries => {
    if(entries[0].isIntersecting && renderedUpto < paragraphs.length) appendChunks(renderedUpto + CHUNK);
  }, { root: rBody, rootMargin: "1200px" }).observe(s);
}
function firstVisibleIndex(){
  const kids = currentBook.type === "text" ? ($("#rText")?.children || []) : (rBody.querySelector(".rpages")?.children || []);
  const top = rBody.scrollTop + 60;
  let lo = 0, hi = kids.length - 1, ans = 0;
  while(lo <= hi){ const mid = (lo+hi) >> 1;
    if(kids[mid].offsetTop <= top){ ans = mid; lo = mid+1; } else hi = mid-1; }
  return ans;
}
function updateProgressUI(){
  const total = currentBook.type === "text" ? paragraphs.length : (currentBook.pageCount || 1);
  const i = firstVisibleIndex();
  const ratio = total > 1 ? i / (total - 1) : 1;
  $("#rBar").style.width = (ratio*100) + "%";
  $("#rPct").textContent = Math.round(ratio*100) + "%";
  $("#rPos").textContent = currentBook.type === "text" ? `¶ ${i+1}/${total}` : `pg ${i+1}/${total}`;
}
async function saveProgress(){
  if(!currentBook) return;
  const total = currentBook.type === "text" ? paragraphs.length : (currentBook.pageCount || 1);
  const i = firstVisibleIndex();
  currentBook.progress = { pos: i, ratio: total > 1 ? i/(total-1) : 1 };
  await dbPut("books", currentBook);
}
$("#rBack").onclick = async () => { ttsStop(); await saveProgress(); reader.classList.remove("open"); currentBook = null; switchTab("library"); };
$("#rFontUp").onclick = () => { prefs.fontSize = Math.min(26, prefs.fontSize+1); savePrefs(); document.documentElement.style.setProperty("--rd-size", prefs.fontSize+"px"); };
$("#rFontDn").onclick = () => { prefs.fontSize = Math.max(13, prefs.fontSize-1); savePrefs(); document.documentElement.style.setProperty("--rd-size", prefs.fontSize+"px"); };
$("#rTheme").onclick = () => { prefs.theme = prefs.theme === "light" ? "dark" : "light"; savePrefs(); reader.className = "reader open " + prefs.theme; };

/* =================== AUDIOBOOK (Web Speech) =================== */
const synth = window.speechSynthesis;
let speaking = false, speakIdx = 0, voices = [];
function ttsPrepare(){
  speakIdx = Math.floor(currentBook.progress?.pos || 0);
  loadVoices();
  if(synth) synth.onvoiceschanged = loadVoices;
  $("#tRate").value = prefs.rate; $("#tRateVal").textContent = prefs.rate.toFixed(1) + "×";
}
function loadVoices(){
  voices = synth ? synth.getVoices() : [];
  const sel = $("#tVoice");
  sel.innerHTML = voices.map((v,i) => `<option value="${i}" ${v.name === prefs.voice ? "selected" : ""}>${esc(v.name)}${v.lang ? " ("+v.lang+")" : ""}</option>`).join("") || `<option>Default voice</option>`;
}
function setPlayIcon(playing){
  $("#tPlayIcon").innerHTML = playing ? '<path d="M7 5h4v14H7zM13 5h4v14h-4z"/>' : '<path d="M8 5l11 7-11 7z"/>';
  $("#tPlay").setAttribute("aria-label", playing ? "Pause read-aloud" : "Play read-aloud");
}
function highlight(i, scroll = true){
  rBody.querySelectorAll("p.speaking").forEach(p => p.classList.remove("speaking"));
  const host = $("#rText"); if(!host) return;
  if(i >= renderedUpto) appendChunks(i + CHUNK);
  const el = host.children[i];
  if(el){ el.classList.add("speaking"); if(scroll) el.scrollIntoView({ block: "center", behavior: "smooth" }); }
}
function speakFrom(i){
  if(!synth){ toast("Read-aloud isn't supported on this browser"); return; }
  if(i >= paragraphs.length){ ttsStop(); toast("End of book"); return; }
  speakIdx = i; speaking = true; setPlayIcon(true);
  synth.cancel();
  const u = new SpeechSynthesisUtterance(paragraphs[i]);
  const v = voices[+$("#tVoice").value];
  if(v){ u.voice = v; prefs.voice = v.name; savePrefs(); }
  u.rate = prefs.rate;
  u.onend = () => { if(speaking) speakFrom(speakIdx + 1); };
  u.onerror = () => { if(speaking) speakFrom(speakIdx + 1); };
  highlight(i);
  currentBook.progress = { pos: i, ratio: paragraphs.length > 1 ? i/(paragraphs.length-1) : 1 };
  dbPut("books", currentBook);
  updateProgressUI();
  synth.speak(u);
}
function ttsStop(){
  speaking = false;
  if(synth) synth.cancel();
  setPlayIcon(false);
  rBody.querySelectorAll("p.speaking").forEach(p => p.classList.remove("speaking"));
}
$("#tPlay").onclick = () => {
  if(speaking){ ttsStop(); saveProgress(); }
  else speakFrom(Math.max(speakIdx, firstVisibleIndex()));
};
$("#tPrev").onclick = () => { if(speaking) speakFrom(Math.max(0, speakIdx - 1)); else { speakIdx = Math.max(0, speakIdx - 1); highlight(speakIdx); } };
$("#tNext").onclick = () => { if(speaking) speakFrom(speakIdx + 1); else { speakIdx = Math.min(paragraphs.length - 1, speakIdx + 1); highlight(speakIdx); } };
$("#tRate").oninput = e => {
  prefs.rate = +e.target.value; savePrefs();
  $("#tRateVal").textContent = prefs.rate.toFixed(1) + "×";
  if(speaking) speakFrom(speakIdx); // restart current paragraph at new rate
};
$("#tVoice").onchange = () => { if(speaking) speakFrom(speakIdx); };
document.addEventListener("visibilitychange", () => { if(document.hidden && currentBook) saveProgress(); });

/* =================== router =================== */
const tabs = { library: renderLibrary, discover: renderDiscover, create: renderCreate, settings: renderSettings };
const titles = { library: "Library", discover: "Discover", create: "Create", settings: "Settings" };
function switchTab(name){
  document.querySelectorAll("nav [data-tab]").forEach(x => x.classList.toggle("active", x.dataset.tab === name));
  $("#tabTitle").textContent = titles[name];
  closeSheet();
  tabs[name]();
}
document.querySelectorAll("nav [data-tab]").forEach(b => b.onclick = () => switchTab(b.dataset.tab));

dbOpen().then(async () => {
  captureFriendLink();
  captureTextShareLink();
  noteLibraryOrigin();
  await ensurePersistentStorage();
  await repairComicStorage();
  updateInstallBanner();
  switchTab("library");
}).catch(() => {
  view.innerHTML = `<div class="card"><div class="empty">This browser blocked local storage (common in private browsing). Open Shelfside in a normal tab to use your library.</div></div>`;
});

if(isStandalone()) document.documentElement.classList.add("pwa");
</script>
